<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>未配リスク計算機 | DPプロフェッショナル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0c10; color: #e6edf3; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 16px; }
        .alert { border: 2px solid #f85149; background: #211515; }
        .input-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px; text-align: center; color: white; width: 100%; font-weight: bold; font-size: 16px; }
        .label-text { font-size: 10px; color: #8b949e; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        input[type=range] { width: 100%; accent-color: #58a6ff; cursor: pointer; height: 30px; }
        #auth-overlay { position: fixed; inset: 0; background: #0a0c10; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="auth-overlay">
        <h2 class="text-xl font-bold mb-4">LICENSE AUTHENTICATION</h2>
        <p class="text-xs text-gray-500 mb-6">Amazon DP専用 未配リスク計算機<br>ライセンスキーを入力してください。</p>
        <input type="password" id="pass-input" class="input-box max-w-xs mb-4" placeholder="Password">
        <button onclick="validateLicense()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold active:scale-95 transition-all">認証する</button>
    </div>

    <div id="main-content" style="display:none;">
        <header class="max-w-4xl mx-auto mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-xl font-black tracking-tighter text-blue-400 italic">FLEET MONITOR</h1>
                    <div id="mode-badge" class="text-[9px] font-bold px-2 py-0.5 rounded bg-green-900 text-green-300 inline-block uppercase">Real-time</div>
                </div>
                <div class="text-right">
                    <div id="display-time" class="text-3xl font-mono font-black text-blue-400 leading-none">00:00</div>
                    <button onclick="resetToNow()" class="mt-2 text-[10px] font-bold bg-blue-600 text-white px-3 py-1 rounded-full active:scale-95 transition-all">↺ 現在時刻に同期</button>
                </div>
            </div>
            <div class="bg-[#161b22] p-3 rounded-xl border border-gray-800">
                <div class="flex justify-between text-[10px] font-bold text-gray-500 mb-1">
                    <span>06:00</span>
                    <span>時刻コントロール (シミュレーション)</span>
                    <span>22:00</span>
                </div>
                <input type="range" id="time-slider" min="360" max="1320" step="1">
            </div>
        </header>
        <div id="grid" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        // --- 認証ロジック ---
        const LICENSE_MASTER = { "amz-dp-trial": "2026-04-02" }; // note配布用パスワード

        function validateLicense() {
            const input = document.getElementById('pass-input').value;
            const expiry = LICENSE_MASTER[input];
            if (expiry) {
                const today = new Date();
                if (today > new Date(expiry)) {
                    alert("ライセンスの有効期限が切れています。");
                } else {
                    localStorage.setItem("active_license_key_v10", input);
                    startApp();
                }
            } else {
                alert("無効なパスワードです。");
            }
        }

        function startApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            initApp();
        }

        // --- 本体ロジック ---
        const STORAGE_KEY = 'smart_delivery_v10';
        let isSimMode = false;
        let simMinutes = 0;
        let drivers = [];

        function initApp() {
            drivers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || Array.from({ length: 5 }, (_, i) => ({
                name: `Driver ${i + 1}`, total: 100, done: 0, absent: 0, start: "08:00", end: "20:00"
            }));
            const initNow = new Date();
            document.getElementById('time-slider').value = initNow.getHours() * 60 + initNow.getMinutes();
            render();
            setInterval(() => { if (!isSimMode) render(); }, 30000);
        }

        function getActiveTime() {
            const now = new Date();
            if (!isSimMode) return now;
            now.setHours(Math.floor(simMinutes / 60), simMinutes % 60, 0, 0);
            return now;
        }

        function calculate(d, activeTime) {
            const parse = (t) => {
                const [h, m] = t.split(':').map(Number);
                const dt = new Date(activeTime); dt.setHours(h, m, 0, 0); return dt;
            };
            const start = parse(d.start);
            const end = parse(d.end);
            const elapsed = Math.max(0.1, (activeTime - start) / (1000 * 60 * 60)); 
            const remaining = Math.max(0.1, (end - activeTime) / (1000 * 60 * 60)); 
            const currentPace = d.done / elapsed; 
            const leftItems = Math.max(0, d.total - d.done - d.absent); 
            const reqPace = leftItems / remaining; 
            const risk = d.done > 0 ? Math.min(200, Math.floor((reqPace / Math.max(0.1, currentPace)) * 100)) : 0;
            const predict = Math.max(0, Math.ceil(leftItems - (currentPace * remaining)));
            return { risk, predict, pace: currentPace.toFixed(1) };
        }

        function render() {
            const activeTime = getActiveTime();
            document.getElementById('display-time').innerText = activeTime.getHours().toString().padStart(2, '0') + ':' + activeTime.getMinutes().toString().padStart(2, '0');
            const container = document.getElementById('grid');
            container.innerHTML = '';
            drivers.forEach((d, i) => {
                const stats = calculate(d, activeTime);
                const isAlert = stats.risk >= 100 && stats.predict > 0;
                const div = document.createElement('div');
                div.className = `card ${isAlert ? 'alert' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <input class="bg-transparent font-bold text-white outline-none border-b border-gray-700 w-1/2" value="${d.name}" oninput="drivers[${i}].name=this.value;save()">
                        <div class="text-right"><span class="label-text">Risk Score</span><div class="text-2xl font-black ${isAlert ? 'text-red-500' : 'text-green-400'}">${stats.risk}%</div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5"><div class="label-text">Pace</div><div class="text-xl font-bold text-blue-300">${stats.pace}<span class="text-[10px] ml-1">/h</span></div></div>
                        <div class="bg-black/40 p-3 rounded-lg border border-white/5"><div class="label-text">未配予測</div><div class="text-xl font-bold ${stats.predict > 0 ? 'text-red-400' : 'text-green-400'}">${stats.predict > 0 ? stats.predict + '個' : '完配見込'}</div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><div class="label-text text-blue-400">完了数</div><input type="number" class="input-box" value="${d.done}" oninput="drivers[${i}].done=Number(this.value);save();render()"></div>
                        <div><div class="label-text text-orange-400">不在数</div><input type="number" class="input-box" value="${d.absent}" oninput="drivers[${i}].absent=Number(this.value);save();render()"></div>
                        <div class="col-span-2 grid grid-cols-3 gap-2 pt-2 border-t border-gray-800 mt-2">
                            <div><div class="label-text">総数</div><input type="number" class="input-box text-sm p-1" value="${d.total}" oninput="drivers[${i}].total=Number(this.value);save();render()"></div>
                            <div><div class="label-text">開始</div><input type="text" class="input-box text-sm p-1" value="${d.start}" oninput="drivers[${i}].start=this.value;save();render()"></div>
                            <div><div class="label-text">終了</div><input type="text" class="input-box text-sm p-1" value="${d.end}" oninput="drivers[${i}].end=this.value;save();render()"></div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(drivers)); }
        function resetToNow() { isSimMode = false; const now = new Date(); document.getElementById('time-slider').value = now.getHours() * 60 + now.getMinutes(); render(); }
        document.getElementById('time-slider').oninput = function() { isSimMode = true; simMinutes = Number(this.value); render(); };

        // 自動ログイン確認
        const savedKey = localStorage.getItem("active_license_key_v10");
        if (savedKey && LICENSE_MASTER[savedKey]) { startApp(); }
    </script>
</body>
</html>
